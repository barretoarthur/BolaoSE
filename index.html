<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Bolão da Copa do Mundo 2026 - Zênite DeMolay. Faça seus palpites e dispute com seus irmãos!">
  <title>Bolão Copa do Mundo 2026 | Zênite</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ========== SPLASH / LOADING ========== -->
  <div class="splash-screen" id="splashScreen">
    <div class="spinner"></div>
    <p>Carregando...</p>
  </div>

  <!-- ========== TELA DE LOGIN / CADASTRO ========== -->
  <div class="login-screen hidden" id="loginScreen">
    <div class="login-container">
      <!-- Logos no topo -->
      <div class="login-logos">
        <img src="Brasão.png" alt="Brasão Zênite">
        <img src="IMG_2799.PNG" alt="GCE-SE 2026/2028">
      </div>
      <h1>⚽ Bolão Copa 2026</h1>
      <h2>Faça seus palpites e dispute com seus irmãos!</h2>

      <!-- Abas Login / Cadastrar -->
      <div class="login-tabs">
        <button class="login-tab active" id="tabLogin" onclick="switchLoginMode('login')">Entrar</button>
        <button class="login-tab" id="tabRegister" onclick="switchLoginMode('register')">Cadastrar</button>
      </div>

      <!-- MODO LOGIN -->
      <div id="loginMode">
        <div class="form-group">
          <label for="inputLoginId">Seu ID</label>
          <input type="text" id="inputLoginId" placeholder="Digite seu ID de participante" autocomplete="username">
        </div>
        <button class="btn-primary" id="btnLogin" onclick="handleLogin()">
          Entrar
        </button>
        <p class="login-hint">Ainda não tem ID? <a href="#" onclick="switchLoginMode('register'); return false;">Cadastre-se</a></p>
      </div>

      <!-- MODO CADASTRO -->
      <div id="registerMode" class="hidden">
        <div class="form-group">
          <label for="inputRegId">Digite seu ID</label>
          <input type="text" id="inputRegId" placeholder="Seu ID DeMolay" autocomplete="off">
          <span class="field-hint">Use o ID que você já possui como DeMolay</span>
        </div>
        <div class="form-group">
          <label for="inputRegName">Nome Completo</label>
          <input type="text" id="inputRegName" placeholder="Digite seu nome completo" autocomplete="name">
        </div>
        <div class="form-group">
          <label for="inputRegChapter">Capítulo</label>
          <input type="text" id="inputRegChapter" placeholder="Nome do seu capítulo" autocomplete="organization">
        </div>
        <div class="form-group">
          <label for="inputRegState">Estado</label>
          <select id="inputRegState">
            <option value="">Selecione seu estado</option>
            <option value="AC">Acre (AC)</option>
            <option value="AL">Alagoas (AL)</option>
            <option value="AP">Amapá (AP)</option>
            <option value="AM">Amazonas (AM)</option>
            <option value="BA">Bahia (BA)</option>
            <option value="CE">Ceará (CE)</option>
            <option value="DF">Distrito Federal (DF)</option>
            <option value="ES">Espírito Santo (ES)</option>
            <option value="GO">Goiás (GO)</option>
            <option value="MA">Maranhão (MA)</option>
            <option value="MT">Mato Grosso (MT)</option>
            <option value="MS">Mato Grosso do Sul (MS)</option>
            <option value="MG">Minas Gerais (MG)</option>
            <option value="PA">Pará (PA)</option>
            <option value="PB">Paraíba (PB)</option>
            <option value="PR">Paraná (PR)</option>
            <option value="PE">Pernambuco (PE)</option>
            <option value="PI">Piauí (PI)</option>
            <option value="RJ">Rio de Janeiro (RJ)</option>
            <option value="RN">Rio Grande do Norte (RN)</option>
            <option value="RS">Rio Grande do Sul (RS)</option>
            <option value="RO">Rondônia (RO)</option>
            <option value="RR">Roraima (RR)</option>
            <option value="SC">Santa Catarina (SC)</option>
            <option value="SP">São Paulo (SP)</option>
            <option value="SE">Sergipe (SE)</option>
            <option value="TO">Tocantins (TO)</option>
          </select>
        </div>
        <button class="btn-primary" id="btnRegister" onclick="handleRegister()">
          Cadastrar
        </button>
        <p class="login-hint">Já tem um ID? <a href="#" onclick="switchLoginMode('login'); return false;">Entrar</a></p>
      </div>
    </div>
  </div>

  <!-- ========== TELA PRINCIPAL ========== -->
  <div class="main-screen" id="mainScreen">

    <!-- Header fixo -->
    <header class="header">
      <div class="header-content">
        <div class="header-left">
          <img src="Brasão.png" alt="Zênite">
          <img src="IMG_2799.PNG" alt="GCE-SE">
          <span class="header-title">Bolão Copa 2026</span>
        </div>
        <div class="header-right">
          <div class="user-badge">
            <span class="user-icon">👤</span>
            <span id="headerUserName">Usuário</span>
            <span class="user-state-badge" id="headerUserState"></span>
          </div>
          <button class="btn-logout" onclick="handleLogout()">Sair</button>
        </div>
      </div>
    </header>

    <!-- Abas de navegação -->
    <nav class="nav-tabs" id="navTabs">
      <button class="nav-tab active" data-tab="grupos" onclick="switchTab('grupos')">⚽ Fase de Grupos</button>
      <button class="nav-tab" data-tab="oitavas" onclick="switchTab('oitavas')">🏆 Oitavas</button>
      <button class="nav-tab" data-tab="quartas" onclick="switchTab('quartas')">🥇 Quartas</button>
      <button class="nav-tab" data-tab="semis" onclick="switchTab('semis')">🔥 Semifinais</button>
      <button class="nav-tab" data-tab="final" onclick="switchTab('final')">👑 Final</button>
      <button class="nav-tab" data-tab="campeao" onclick="switchTab('campeao')">🏆 Campeão</button>
      <button class="nav-tab" data-tab="ranking" onclick="switchTab('ranking')">📊 Ranking</button>
    </nav>

    <!-- Conteúdo principal -->
    <main class="main-content" id="mainContent">
      <!-- Conteúdo dinâmico será inserido pelo JavaScript -->
    </main>
  </div>

  <!-- Toast de notificação -->
  <div id="toast" class="toast hidden">
    <span>✅</span>
    <span id="toastMsg">Palpite salvo!</span>
  </div>

  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <script src="script.js"></script>
</body>
</html>
